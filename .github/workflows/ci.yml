name: Heart Disease MLOps CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: heart-disease-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  MODEL_IMAGE_NAME: heart-disease-api
  MODEL_IMAGE_TAG: ci-${{ github.sha }}

jobs:
  lint:
    name: Lint and format validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Display Python version
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Check Ruff formatting
        run: |
          python -m ruff format --check app src scripts tests

      - name: Run Ruff linting
        run: |
          python -m ruff check app src scripts tests

  test:
    name: Unit tests and coverage
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Run tests with coverage
        run: |
          python -m pytest \
            --cov=app \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=70 \
            --junitxml=pytest-results.xml \
            -v

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage-reports
          path: |
            pytest-results.xml
            coverage.xml
            htmlcov/
          if-no-files-found: warn
          retention-days: 14

  train:
    name: Model training and MLflow tracking
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Validate committed dataset
        run: |
          python -c "import pandas as pd; frame = pd.read_csv('data/raw/heart_disease_uci.csv'); assert len(frame) == 920, f'Expected 920 rows, found {len(frame)}'; print('Raw dataset validation passed:', frame.shape)"

      - name: Generate EDA artifacts
        run: |
          python scripts/generate_eda.py

      - name: Train and evaluate models
        run: |
          python scripts/train.py

      - name: Validate generated model artifacts
        run: |
          python -c "from pathlib import Path; required = [Path('models/heart_disease_pipeline.joblib'), Path('models/model_metadata.json'), Path('reports/model_comparison.csv')]; missing = [str(path) for path in required if not path.exists()]; assert not missing, f'Missing generated files: {missing}'; print('Generated model artifacts validated.')"

      - name: Validate packaged model inference
        run: |
          python -c "import json, joblib, pandas as pd; model = joblib.load('models/heart_disease_pipeline.joblib'); payload = json.load(open('sample_request.json', encoding='utf-8')); frame = pd.DataFrame([payload]).astype('float64'); prediction = model.predict(frame); probabilities = model.predict_proba(frame); assert prediction.shape == (1,); assert probabilities.shape == (1, 2); print('Prediction:', prediction.tolist()); print('Probabilities:', probabilities.tolist())"

      - name: Upload training and evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-training-artifacts
          path: |
            models/heart_disease_pipeline.joblib
            models/model_metadata.json
            reports/eda_summary.json
            reports/eda_summary.txt
            reports/figures/
            reports/model_comparison.csv
            reports/model_evaluation/
            mlflow.db
            mlartifacts/
          if-no-files-found: warn
          retention-days: 14

  docker:
    name: Docker build and API smoke test
    runs-on: ubuntu-latest
    needs: train
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Display Docker version
        run: |
          docker version
          docker compose version

      - name: Build API image
        run: |
          docker build \
            --tag "${MODEL_IMAGE_NAME}:${MODEL_IMAGE_TAG}" \
            .

      - name: Inspect built image
        run: |
          docker image inspect \
            "${MODEL_IMAGE_NAME}:${MODEL_IMAGE_TAG}" \
            > docker-image-inspect.json

      - name: Start API container
        run: |
          docker run \
            --detach \
            --name heart-disease-api-ci \
            --publish 8000:8000 \
            "${MODEL_IMAGE_NAME}:${MODEL_IMAGE_TAG}"

      - name: Wait for API readiness
        run: |
          for attempt in $(seq 1 30); do
            if curl \
              --fail \
              --silent \
              --show-error \
              http://127.0.0.1:8000/health/ready \
              > health-response.json; then
              echo "API became ready on attempt ${attempt}."
              cat health-response.json
              exit 0
            fi

            echo "Waiting for API readiness: attempt ${attempt}/30"
            sleep 5
          done

          echo "API did not become ready in time."
          docker logs heart-disease-api-ci
          exit 1

      - name: Test prediction endpoint
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            --request POST \
            --header "Content-Type: application/json" \
            --data @sample_request.json \
            http://127.0.0.1:8000/predict \
            > prediction-response.json

          cat prediction-response.json

          python -c "import json; response = json.load(open('prediction-response.json', encoding='utf-8')); assert response['prediction'] in [0, 1]; assert 0.0 <= response['confidence'] <= 1.0; assert 0.0 <= response['probability_no_disease'] <= 1.0; assert 0.0 <= response['probability_disease'] <= 1.0; assert response['model_name']; print('Prediction response validation passed.')"

      - name: Test Prometheus metrics endpoint
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            http://127.0.0.1:8000/metrics \
            > prometheus-metrics.txt

          grep "heart_api_requests_total" prometheus-metrics.txt
          grep "heart_model_predictions_total" prometheus-metrics.txt
          grep "heart_model_prediction_seconds" prometheus-metrics.txt

      - name: Capture container status and logs
        if: always()
        run: |
          docker ps --all > docker-container-status.txt
          docker inspect heart-disease-api-ci > docker-container-inspect.json 2>/dev/null || true
          docker logs heart-disease-api-ci > docker-container.log 2>&1 || true

      - name: Upload Docker validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-validation-artifacts
          path: |
            health-response.json
            prediction-response.json
            prometheus-metrics.txt
            docker-image-inspect.json
            docker-container-status.txt
            docker-container-inspect.json
            docker-container.log
          if-no-files-found: warn
          retention-days: 14

      - name: Stop API container
        if: always()
        run: |
          docker rm --force heart-disease-api-ci 2>/dev/null || true

  kubernetes-manifest-validation:
    name: Kubernetes manifest validation
    runs-on: ubuntu-latest
    needs: docker
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Display kubectl version
        run: |
          kubectl version --client

      - name: Render Kustomize manifests
        run: |
          kubectl kustomize deployment/kubernetes \
            > rendered-kubernetes-manifests.yaml

      - name: Verify rendered Kubernetes resources
        run: |
          grep "kind: Namespace" rendered-kubernetes-manifests.yaml
          grep "kind: Service" rendered-kubernetes-manifests.yaml
          grep "kind: Deployment" rendered-kubernetes-manifests.yaml
          grep "heart-disease-api:1.0.0" rendered-kubernetes-manifests.yaml

      - name: Upload rendered Kubernetes manifests
        uses: actions/upload-artifact@v4
        with:
          name: rendered-kubernetes-manifests
          path: rendered-kubernetes-manifests.yaml
          if-no-files-found: error
          retention-days: 14