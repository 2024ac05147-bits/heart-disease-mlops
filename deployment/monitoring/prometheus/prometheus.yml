global:
  scrape_interval: 10s
  evaluation_interval: 10s
  scrape_timeout: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: heart-disease-api
    metrics_path: /metrics
    scheme: http

    static_configs:
      - targets:
          - heart-disease-api:8000

        labels:
          application: heart-disease-api
          environment: local