name: heart-disease-monitoring
services:
  heart-disease-api:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.13-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    image: heart-disease-api:1.0.0
    container_name: heart-disease-api
    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      MODEL_PATH: /app/models/heart_disease_pipeline.joblib
      MODEL_METADATA_PATH: /app/models/model_metadata.json

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - monitoring-network

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v3.5.0}
    container_name: heart-disease-prometheus
    restart: unless-stopped

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

    ports:
      - "9090:9090"

    depends_on:
      heart-disease-api:
        condition: service_healthy

    networks:
      - monitoring-network

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:12.1.0}
    container_name: heart-disease-grafana
    restart: unless-stopped

    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"

    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

    ports:
      - "3000:3000"

    depends_on:
      - prometheus

    networks:
      - monitoring-network

networks:
  monitoring-network:
    name: heart-disease-monitoring

volumes:
  prometheus-data:
    name: heart-disease-prometheus-data

  grafana-data:
    name: heart-disease-grafana-data